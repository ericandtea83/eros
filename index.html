<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>不得好鼠拍賣系統 - V5.0 雲端正式版</title>
    <style>
        :root { --bg-body: #050507; --bg-card: rgba(25, 25, 30, 0.95); --accent-cyan: #00f2ff; --accent-purple: #7000ff; --text-main: #ffffff; --text-dim: #88888e; --danger: #ff4655; --success: #00ff88; }
        body { background-color: var(--bg-body); color: var(--text-main); font-family: "Segoe UI", "Microsoft JhengHei", sans-serif; margin: 0; min-height: 100vh; overflow-x: hidden; }
        header { padding: 30px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.05); }
        header h1 { font-size: 2rem; background: linear-gradient(90deg, var(--accent-cyan), var(--accent-purple)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin: 0; }
        #auction-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; padding: 20px; max-width: 1200px; margin: 0 auto; }
        .card { background: var(--bg-card); border: 1px solid rgba(255,255,255,0.1); border-radius: 15px; padding: 20px; position: relative; transition: 0.3s; }
        .card:hover { border-color: var(--accent-cyan); transform: translateY(-5px); }
        .status-badge { position: absolute; top: 0; right: 0; padding: 5px 12px; font-size: 0.7rem; font-weight: bold; border-bottom-left-radius: 10px; }
        .st-active { background: var(--accent-cyan); color: #000; }
        .st-ended { background: var(--danger); color: #fff; }
        .item-name { font-size: 1.5rem; margin: 15px 0 5px 0; font-weight: bold; }
        .timer { color: var(--danger); font-family: monospace; font-size: 1.2rem; margin-bottom: 15px; }
        .price-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .price-item { background: rgba(0,0,0,0.3); padding: 10px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.05); }
        .price-label { font-size: 0.7rem; color: var(--text-dim); }
        .price-val { font-size: 1.1rem; color: var(--accent-cyan); font-weight: bold; }
        .input-group { display: flex; flex-direction: column; gap: 8px; margin-bottom: 15px; }
        input { background: #121216; border: 1px solid #333; color: #fff; padding: 10px; border-radius: 8px; outline: none; }
        input:focus { border-color: var(--accent-cyan); }
        .btn-bid { width: 100%; background: linear-gradient(135deg, var(--accent-purple), var(--accent-cyan)); color: #fff; border: none; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 1rem; }
        .btn-bid:disabled { background: #222; color: #555; cursor: not-allowed; }
        #admin-modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #15151a; padding: 30px; border: 1px solid var(--accent-cyan); z-index: 9999; border-radius: 20px; width: 340px; box-shadow: 0 0 50px #000; }
        #admin-modal input { width: 100%; margin-bottom: 10px; box-sizing: border-box; }
        footer { text-align: center; padding: 50px; color: var(--text-dim); cursor: pointer; font-size: 0.8rem; letter-spacing: 2px; }
    </style>
</head>
<body>

<header><h1>不得好鼠拍賣系統 V5.0</h1></header>
<div id="auction-container"></div>

<!-- 管理員上架視窗 -->
<div id="admin-modal">
    <h3 style="color:var(--accent-cyan); margin-top:0;">DEPLOY NEW ITEM</h3>
    <input type="text" id="m-name" placeholder="商品名稱">
    <input type="number" id="m-start-p" placeholder="起標金額">
    <input type="number" id="m-min" placeholder="最小加價">
    <input type="number" id="m-buy" placeholder="一口直購價">
    <label style="font-size:0.7rem; color:var(--text-dim)">開始時間</label>
    <input type="datetime-local" id="m-t1">
    <label style="font-size:0.7rem; color:var(--text-dim)">結束時間</label>
    <input type="datetime-local" id="m-t2">
    <button class="btn-bid" onclick="addItem()">上架商品</button>
    <button onclick="toggleModal(false)" style="background:none; border:none; color:#555; width:100%; margin-top:10px; cursor:pointer">取消關閉</button>
</div>

<footer onclick="adminLogin()">TERMINAL ACCESS</footer>

<!-- Firebase SDK -->
<script src="https://gstatic.com"></script>
<script src="https://gstatic.com"></script>

<script>
    // 1. Firebase 配置 (已填入你的金鑰)
    const firebaseConfig = {
        apiKey: "AIzaSyBp-Y-QSvCKanAW97wft0sRP0QNwGX0ifc",
        authDomain: "://firebaseapp.com",
        projectId: "mouse-auction-3f133",
        storageBucket: "mouse-auction-3f133.firebasestorage.app",
        databaseURL: "https://firebaseio.com",
        appId: "1:661952425648:web:35c19f3add6c5a9bf3d575"
    };

    // 2. 初始化
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const auctionRef = db.ref('auctions_v5');

    let auctions = [];
    let isAdmin = sessionStorage.getItem('isAdmin') === 'true';

    // 3. 核心監聽：雲端一變，畫面就變
    auctionRef.on('value', (snap) => {
        auctions = snap.val() || [];
        render();
    });

    // 4. 畫面渲染
    function render() {
        const container = document.getElementById('auction-container');
        const savedName = localStorage.getItem('buyer_name') || "";
        container.innerHTML = "";

        auctions.forEach((item, i) => {
            const now = Date.now();
            const t2 = new Date(item.endTime).getTime();
            const isEnded = now > t2;

            const card = document.createElement('div');
            card.className = "card";
            card.innerHTML = `
                <div class="status-badge ${isEnded ? 'st-ended' : 'st-active'}">${isEnded ? 'CLOSED' : 'LIVE'}</div>
                <div class="item-name">${item.name}</div>
                <div class="timer" id="t-${i}">--:--:--</div>
                <div class="price-grid">
                    <div class="price-item"><div class="price-label">目前出價</div><div class="price-val">$${item.currentBid.toLocaleString()}</div></div>
                    <div class="price-item"><div class="price-label">一口價</div><div class="price-val">$${item.buyNow.toLocaleString()}</div></div>
                </div>
                <div class="input-group">
                    <input type="text" id="u-${i}" placeholder="暱稱" value="${savedName}">
                    <input type="number" id="v-${i}" value="${item.currentBid + item.minInc}">
                </div>
                <button class="btn-bid" onclick="bid(${i})" ${isEnded ? 'disabled' : ''}>確認出價</button>
                ${isAdmin ? `<button onclick="del(${i})" style="color:red; background:none; border:none; margin-top:15px; cursor:pointer; font-size:0.7rem;">[ 刪除商品 ]</button>` : ''}
            `;
            container.appendChild(card);
        });
    }

    // 5. 出價功能
    function bid(i) {
        const user = document.getElementById(`u-${i}`).value;
        const val = parseInt(document.getElementById(`v-${i}`).value);
        if(!user) return alert("請輸入暱稱");
        if(val < auctions[i].currentBid + auctions[i].minInc) return alert("出價低於加價規範");
        
        localStorage.setItem('buyer_name', user);
        auctions[i].currentBid = val;
        auctionRef.set(auctions);
    }

    // 6. 管理員登入
    function adminLogin() {
        const pw = prompt("請輸入管理密碼：");
        if(pw === "1234") {
            sessionStorage.setItem('isAdmin', 'true');
            isAdmin = true;
            toggleModal(true);
            render();
        } else if (pw !== null) {
            alert("密碼錯誤");
        }
    }

    function toggleModal(s) {
        document.getElementById('admin-modal').style.display = s ? 'block' : 'none';
    }

    function addItem() {
        const name = document.getElementById('m-name').value;
        if(!name) return alert("請填寫商品名稱");
        
        auctions.push({
            name: name,
            currentBid: parseInt(document.getElementById('m-start-p').value) || 0,
            minInc: parseInt(document.getElementById('m-min').value) || 10,
            buyNow: parseInt(document.getElementById('m-buy').value) || 9999,
            startTime: document.getElementById('m-t1').value,
            endTime: document.getElementById('m-t2').value
        });
        auctionRef.set(auctions);
        toggleModal(false);
    }

    function del(i) { if(confirm("確定刪除此商品？")) { auctions.splice(i,1); auctionRef.set(auctions); } }

    // 7. 倒數計時器
    setInterval(() => {
        auctions.forEach((item, i) => {
            const el = document.getElementById(`t-${i}`);
            if(!el) return;
            const diff = new Date(item.endTime) - new Date();
            if(diff <= 0) {
                el.innerText = "競標結束";
                el.style.color = "var(--text-dim)";
            } else {
                const h = Math.floor(diff/3600000).toString().padStart(2,'0');
                const m = Math.floor((diff%3600000)/60000).toString().padStart(2,'0');
                const s = Math.floor((diff%60000)/1000).toString().padStart(2,'0');
                el.innerText = `${h}:${m}:${s}`;
            }
        });
    }, 1000);
</script>
</body>
</html>
