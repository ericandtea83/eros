<!-- 1. 引入 Firebase 核心零件 (CDN) -->
<script src="https://gstatic.com"></script>
<script src="https://gstatic.com"></script>

<script>
    // 2. 你的雲端連接設定
    const firebaseConfig = {
        apiKey: "AIzaSyBp-Y-QSvCKanAW97wft0sRP0QNwGX0ifc",
        authDomain: "://firebaseapp.com",
        projectId: "mouse-auction-3f133",
        storageBucket: "mouse-auction-3f133.firebasestorage.app",
        messagingSenderId: "661952425648",
        appId: "1:661952425648:web:35c19f3add6c5a9bf3d575",
        measurementId: "G-1HL9W1205H",
        // 這是你的資料庫專屬網址
        databaseURL: "https://firebaseio.com"
    };

    // 3. 初始化雲端大腦
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const auctionRef = db.ref('auctions_v5'); // 雲端資料夾名稱

    let auctions = [];
    let isAdmin = sessionStorage.getItem('isAdmin') === 'true';

    // 4. 監聽雲端資料：只要資料庫一變，全世界網頁同步更新
    auctionRef.on('value', (snapshot) => {
        const data = snapshot.val();
        auctions = data ? data : [];
        render(); 
    });

    // 5. 儲存功能：將本地變動推送到雲端
    function saveToCloud() {
        auctionRef.set(auctions);
    }

    // 6. 核心功能邏輯
    function init() {
        render();
        setInterval(tick, 1000);
    }

    function render() {
        const container = document.getElementById('auction-container');
        const savedName = localStorage.getItem('buyer_name') || "";
        container.innerHTML = "";

        auctions.forEach((item, index) => {
            const now = new Date().getTime();
            const t1 = new Date(item.startTime).getTime();
            const t2 = new Date(item.endTime).getTime();
            
            let status = 'st-upcoming';
            let statusText = '尚未開始';
            if (now > t2) { status = 'st-ended'; statusText = '已結標'; }
            else if (now > t1) { status = 'st-active'; statusText = '競標中'; }

            const histHtml = (item.history || []).map(h => `
                <div class="hist-entry">
                    <span class="hist-user">${h.user}</span>
                    <span class="hist-amt">$${h.amount.toLocaleString()}</span>
                </div>
            `).reverse().slice(0, 5).join('');

            const card = document.createElement('div');
            card.className = "card";
            card.innerHTML = `
                <div class="status-badge ${status}">${statusText}</div>
                <div class="item-name">${item.name}</div>
                <div class="timer" id="timer-${index}">計算中...</div>
                <div class="price-grid">
                    <div class="price-item">
                        <div class="price-label">目前出價</div>
                        <div class="price-val">$${item.currentBid.toLocaleString()}</div>
                    </div>
                    <div class="price-item">
                        <div class="price-label">一口價</div>
                        <div class="price-val">$${item.buyNow.toLocaleString()}</div>
                    </div>
                </div>
                <div class="history-list">${histHtml || '尚無紀錄'}</div>
                <div class="input-group">
                    <input type="text" id="user-${index}" placeholder="暱稱" value="${savedName}">
                    <input type="number" id="val-${index}" placeholder="金額" value="${item.currentBid + item.minInc}">
                </div>
                <button class="btn-bid" onclick="placeBid(${index})" ${status !== 'st-active' ? 'disabled' : ''}>確認出價</button>
                ${isAdmin ? `<button class="admin-del-btn" onclick="delItem(${index})">刪除商品</button>` : ''}
            `;
            container.appendChild(card);
        });
    }

    function placeBid(index) {
        const nameInput = document.getElementById(`user-${index}`).value;
        const bidVal = parseInt(document.getElementById(`val-${index}`).value);
        const item = auctions[index];

        if (!nameInput) return alert("請輸入暱稱");
        if (bidVal < item.currentBid + item.minInc) return alert("出價不得低於最低加價幅度");

        localStorage.setItem('buyer_name', nameInput);
        
        item.currentBid = bidVal;
        if (!item.history) item.history = [];
        item.history.push({user: nameInput, amount: bidVal, time: new Date().toLocaleTimeString()});

        saveToCloud(); // 同步到雲端
    }

    function tick() {
        auctions.forEach((item, index) => {
            const timerEl = document.getElementById(`timer-${index}`);
            if (!timerEl) return;
            const now = new Date().getTime();
            const t2 = new Date(item.endTime).getTime();
            const diff = t2 - now;

            if (diff <= 0) {
                timerEl.innerText = "競標結束";
                timerEl.style.color = "var(--text-dim)";
            } else {
                const h = Math.floor(diff / 3600000);
                const m = Math.floor((diff % 3600000) / 60000);
                const s = Math.floor((diff % 60000) / 1000);
                timerEl.innerText = `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
            }
        });
    }

    // 管理員功能
    function toggleModal(show) { document.getElementById('admin-modal').style.display = show ? 'block' : 'none'; }
    
    document.getElementById('footer-access').onclick = () => {
        const pw = prompt("ENTER ADMIN PASSWORD:");
        if (pw === "1234") { // 預設密碼
            sessionStorage.setItem('isAdmin', 'true');
            location.reload();
        }
    };

    function addItem() {
        const newItem = {
            id: Date.now(),
            name: document.getElementById('m-name').value,
            currentBid: parseInt(document.getElementById('m-start-p').value),
            minInc: parseInt(document.getElementById('m-min').value),
            buyNow: parseInt(document.getElementById('m-buy').value),
            startTime: document.getElementById('m-t1').value,
            endTime: document.getElementById('m-t2').value,
            history: []
        };
        auctions.push(newItem);
        saveToCloud();
        toggleModal(false);
    }

    function delItem(index) {
        if(confirm("確定刪除？")) {
            auctions.splice(index, 1);
            saveToCloud();
        }
    }

    init();
</script>
