<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>不得好鼠拍賣系統 - V5.0 雲端版</title>
    <style>
        :root { --bg-body: #050507; --bg-card: rgba(25, 25, 30, 0.95); --accent-cyan: #00f2ff; --accent-purple: #7000ff; --text-main: #ffffff; --text-dim: #88888e; --danger: #ff4655; --success: #00ff88; }
        body { background-color: var(--bg-body); color: var(--text-main); font-family: "Segoe UI", sans-serif; margin: 0; min-height: 100vh; }
        header { padding: 30px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.05); }
        header h1 { font-size: 2rem; background: linear-gradient(90deg, var(--accent-cyan), var(--accent-purple)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin: 0; }
        #auction-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; padding: 20px; max-width: 1200px; margin: 0 auto; }
        .card { background: var(--bg-card); border: 1px solid rgba(255,255,255,0.1); border-radius: 15px; padding: 20px; position: relative; }
        .status-badge { position: absolute; top: 0; right: 0; padding: 5px 12px; font-size: 0.7rem; font-weight: bold; border-bottom-left-radius: 10px; }
        .st-active { background: var(--accent-cyan); color: #000; }
        .item-name { font-size: 1.4rem; margin: 10px 0; }
        .timer { color: var(--danger); font-weight: bold; margin-bottom: 15px; }
        .price-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .price-item { background: rgba(0,0,0,0.3); padding: 10px; border-radius: 8px; }
        .price-label { font-size: 0.7rem; color: var(--text-dim); }
        .price-val { font-size: 1.1rem; color: var(--accent-cyan); font-weight: bold; }
        .input-group { display: flex; gap: 8px; margin-bottom: 10px; }
        input { background: #121216; border: 1px solid #333; color: #fff; padding: 10px; border-radius: 8px; width: 100%; box-sizing: border-box; }
        .btn-bid { width: 100%; background: linear-gradient(135deg, var(--accent-purple), var(--accent-cyan)); color: #fff; border: none; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        #admin-modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #15151a; padding: 25px; border: 1px solid var(--accent-cyan); z-index: 999; border-radius: 20px; width: 320px; }
        footer { text-align: center; padding: 40px; color: var(--text-dim); cursor: pointer; font-size: 0.8rem; }
    </style>
</head>
<body>

<header><h1>不得好鼠拍賣系統 V5.0</h1></header>
<div id="auction-container"></div>

<div id="admin-modal" id="modal">
    <h3 style="color:var(--accent-cyan)">新增商品</h3>
    <input type="text" id="m-name" placeholder="商品名稱"><br><br>
    <input type="number" id="m-start-p" placeholder="起標價"><br><br>
    <input type="number" id="m-min" placeholder="最小加價"><br><br>
    <input type="number" id="m-buy" placeholder="直購價"><br><br>
    <input type="datetime-local" id="m-t1"><br><br>
    <input type="datetime-local" id="m-t2"><br><br>
    <button class="btn-bid" onclick="addItem()">上架</button>
    <button onclick="toggleModal(false)" style="background:none; border:none; color:gray; width:100%; margin-top:10px;">取消</button>
</div>

<footer onclick="adminLogin()">TERMINAL ACCESS</footer>

<script src="https://gstatic.com"></script>
<script src="https://gstatic.com"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBp-Y-QSvCKanAW97wft0sRP0QNwGX0ifc",
        authDomain: "://firebaseapp.com",
        projectId: "mouse-auction-3f133",
        databaseURL: "https://firebaseio.com",
        appId: "1:661952425648:web:35c19f3add6c5a9bf3d575"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const auctionRef = db.ref('auctions_v5');

    let auctions = [];
    let isAdmin = sessionStorage.getItem('isAdmin') === 'true';

    auctionRef.on('value', (snap) => {
        auctions = snap.val() || [];
        render();
    });

    function render() {
        const container = document.getElementById('auction-container');
        container.innerHTML = "";
        auctions.forEach((item, i) => {
            const card = document.createElement('div');
            card.className = "card";
            card.innerHTML = `
                <div class="status-badge st-active">LIVE</div>
                <div class="item-name">${item.name}</div>
                <div class="timer" id="t-${i}">--:--:--</div>
                <div class="price-grid">
                    <div class="price-item"><div class="price-label">目前出價</div><div class="price-val">$${item.currentBid}</div></div>
                    <div class="price-item"><div class="price-label">一口價</div><div class="price-val">$${item.buyNow}</div></div>
                </div>
                <div class="input-group">
                    <input type="text" id="u-${i}" placeholder="暱稱">
                    <input type="number" id="v-${i}" value="${item.currentBid + item.minInc}">
                </div>
                <button class="btn-bid" onclick="bid(${i})">確認出價</button>
                ${isAdmin ? `<button onclick="del(${i})" style="color:red; background:none; border:none; margin-top:10px; width:100%">刪除商品</button>` : ''}
            `;
            container.appendChild(card);
        });
    }

    function bid(i) {
        const user = document.getElementById(`u-${i}`).value;
        const val = parseInt(document.getElementById(`v-${i}`).value);
        if(!user) return alert("請輸入暱稱");
        auctions[i].currentBid = val;
        auctionRef.set(auctions);
    }

    function adminLogin() {
        if(prompt("密碼") === "1234") {
            sessionStorage.setItem('isAdmin', 'true');
            isAdmin = true;
            toggleModal(true);
            render();
        }
    }

    function toggleModal(s) { document.getElementById('admin-modal').style.display = s ? 'block' : 'none'; }

    function addItem() {
        auctions.push({
            name: document.getElementById('m-name').value,
            currentBid: parseInt(document.getElementById('m-start-p').value),
            minInc: parseInt(document.getElementById('m-min').value),
            buyNow: parseInt(document.getElementById('m-buy').value),
            startTime: document.getElementById('m-t1').value,
            endTime: document.getElementById('m-t2').value
        });
        auctionRef.set(auctions);
        toggleModal(false);
    }

    function del(i) { if(confirm("刪除？")) { auctions.splice(i,1); auctionRef.set(auctions); } }

    setInterval(() => {
        auctions.forEach((item, i) => {
            const el = document.getElementById(`t-${i}`);
            if(!el) return;
            const diff = new Date(item.endTime) - new Date();
            if(diff < 0) return el.innerText = "已結束";
            const s = Math.floor(diff/1000);
            el.innerText = `${Math.floor(s/3600)}:${Math.floor((s%3600)/60) || '00'}:${s%60}`;
        });
    }, 1000);
</script>
</body>
</html>
