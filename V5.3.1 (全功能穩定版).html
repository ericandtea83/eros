<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>不得好鼠拍賣系統 - V5.3.1 穩定優化版</title>
    <style>
        :root {
            --bg-body: #050507;
            --bg-card: rgba(25, 25, 30, 0.98);
            --accent-cyan: #00f2ff;
            --accent-purple: #7000ff;
            --text-main: #ffffff;
            --text-dim: #88888e;
            --danger: #ff4655;
            --success: #00ff88;
        }

        body {
            background-color: var(--bg-body);
            color: var(--text-main);
            font-family: "Microsoft JhengHei", sans-serif;
            margin: 0;
            background-image: radial-gradient(circle at 20% 20%, #1a1a2e 0%, transparent 40%);
            min-height: 100vh;
        }

        header { padding: 25px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.05); }
        header h1 { font-size: 2.2rem; letter-spacing: 2px; background: linear-gradient(90deg, var(--accent-cyan), var(--accent-purple)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin: 0; }

        #auction-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(360px, 1fr)); gap: 25px; padding: 30px; max-width: 1400px; margin: 0 auto; }

        .card { background: var(--bg-card); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; padding: 24px; position: relative; transition: 0.3s ease; }
        .card:hover { border-color: var(--accent-cyan); box-shadow: 0 0 30px rgba(0,242,255,0.1); }
        
        .status-badge { position: absolute; top: 0; right: 0; padding: 6px 15px; font-size: 0.75rem; font-weight: bold; border-bottom-left-radius: 15px; }
        .st-upcoming { background: #444; color: #fff; }
        .st-active { background: var(--accent-cyan); color: #000; font-weight: 900; }
        .st-ended { background: var(--danger); color: #fff; }

        .item-name { font-size: 1.6rem; color: #fff; margin: 15px 0 5px 0; font-weight: 900; }
        .timer { font-family: 'Courier New', Courier, monospace; font-size: 1.3rem; color: var(--danger); margin-bottom: 20px; }

        .price-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .price-item { background: rgba(0,0,0,0.4); padding: 12px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.05); }
        .price-label { font-size: 0.7rem; color: var(--text-dim); margin-bottom: 4px; }
        .price-val { font-size: 1.2rem; font-weight: bold; color: var(--accent-cyan); }

        .history-list { height: 90px; overflow-y: auto; background: rgba(0,0,0,0.2); border-radius: 10px; padding: 10px; font-size: 0.85rem; margin-bottom: 20px; border-left: 3px solid var(--accent-purple); }
        .hist-entry { display: flex; justify-content: space-between; padding: 4px 0; border-bottom: 1px solid rgba(255,255,255,0.03); }

        .input-group { display: flex; flex-direction: column; gap: 8px; margin-bottom: 12px; }
        input { background: #121216; border: 1px solid #333; color: #fff; padding: 12px; border-radius: 10px; font-size: 1rem; width: 100%; box-sizing: border-box; }
        input:focus { border-color: var(--accent-cyan); outline: none; background: #1a1a20; }
        
        .quick-bid-row { display: flex; gap: 8px; margin-bottom: 12px; }
        .btn-quick { flex: 1; background: #222; border: 1px solid #444; color: var(--text-dim); font-size: 0.75rem; padding: 8px; border-radius: 6px; cursor: pointer; transition: 0.2s; }
        .btn-quick:hover { border-color: var(--accent-cyan); color: #fff; }

        .btn-bid { width: 100%; background: linear-gradient(135deg, var(--accent-purple), var(--accent-cyan)); color: #fff; border: none; padding: 14px; border-radius: 10px; font-weight: bold; cursor: pointer; transition: 0.3s; font-size: 1.1rem; }
        .btn-bid:hover:not(:disabled) { filter: brightness(1.2); }
        /* 領先中的樣式 */
        .btn-bid:disabled { background: #1a1a1a; color: var(--success); cursor: not-allowed; filter: none; border: 1px solid var(--success); }

        .win-box { display: none; background: rgba(0, 255, 136, 0.1); border: 1px solid var(--success); padding: 15px; border-radius: 12px; text-align: center; }

        #admin-modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #15151a; padding: 30px; border: 2px solid var(--accent-cyan); z-index: 1001; width: 360px; border-radius: 24px; box-shadow: 0 0 100px #000; }
        #admin-modal input { margin-bottom: 10px; }
        .admin-del-btn { background: none; border: 1px solid var(--danger); color: var(--danger); width: 100%; padding: 10px; border-radius: 10px; cursor: pointer; margin-top: 15px; }

        footer { text-align: center; padding: 50px; color: var(--text-dim); font-size: 0.8rem; cursor: pointer; }
    </style>
</head>
<body>

<header><h1>不得好鼠拍賣系統</h1></header>

<div id="auction-container"></div>

<div id="admin-modal">
    <h3 style="margin-top:0; color:var(--accent-cyan);">商品發布管理</h3>
    <input type="text" id="m-name" placeholder="商品名稱">
    <input type="number" id="m-start-p" placeholder="起標金額">
    <input type="number" id="m-min" placeholder="最低加價幅度">
    <input type="number" id="m-buy" placeholder="一口直購價">
    <label style="font-size:0.7rem; color:var(--accent-cyan)">開始日期與時間</label>
    <input type="datetime-local" id="m-t1">
    <label style="font-size:0.7rem; color:var(--accent-cyan)">結束日期與時間</label>
    <input type="datetime-local" id="m-t2">
    <input type="text" id="m-contact" placeholder="聯繫資訊 (LINE/ID)">
    <button class="btn-bid" onclick="addItem()">上架商品</button>
    <button onclick="toggleModal(false)" style="background:none; border:none; color:gray; width:100%; margin-top:10px; cursor:pointer">取消關閉</button>
</div>

<footer id="footer-btn">SYSTEM TERMINAL</footer>

<script>
    let auctions = JSON.parse(localStorage.getItem('mouse_v53')) || [];
    let isAdmin = sessionStorage.getItem('isAdmin') === 'true';

    // 產生或獲取這台電腦的唯一識別碼，用來判斷是不是「同一個人」出價
    let myBidderId = localStorage.getItem('bidder_id');
    if (!myBidderId) {
        myBidderId = 'id-' + Date.now() + '-' + Math.floor(Math.random() * 1000);
        localStorage.setItem('bidder_id', myBidderId);
    }

    function init() {
        render();
        setInterval(tick, 1000);
    }

    function render() {
        const container = document.getElementById('auction-container');
        const savedName = localStorage.getItem('buyer_name') || "";
        container.innerHTML = "";

        auctions.forEach((item) => {
            const histHtml = formatHistory(item.history);
            // 判斷目前這台電腦是否為最高出價者
            const isLeading = (item.lastBidderId === myBidderId);

            const card = document.createElement('div');
            card.className = "card";
            card.id = `card-${item.id}`;
            card.innerHTML = `
                <div id="badge-${item.id}" class="status-badge">SYNC</div>
                <div class="item-name">${item.name}</div>
                <div class="timer" id="timer-${item.id}">--:--:--</div>
                
                <div class="price-grid">
                    <div class="price-item">
                        <div class="price-label">目前最高價</div>
                        <div id="disp-bid-${item.id}" class="price-val">$${item.currentBid.toLocaleString()}</div>
                    </div>
                    <div class="price-item">
                        <div class="price-label">一口直購價</div>
                        <div class="price-val" style="color:#fff">$${item.buyNow.toLocaleString()}</div>
                    </div>
                </div>

                <div class="history-list" id="disp-hist-${item.id}">${histHtml || '尚無出價紀錄'}</div>

                <div id="ui-bid-${item.id}">
                    <div class="input-group">
                        <input type="text" id="user-${item.id}" placeholder="暱稱" value="${savedName}">
                        <input type="number" id="val-${item.id}" placeholder="出價金額" onfocus="this.select()" value="${item.currentBid + item.minInc}">
                    </div>
                    
                    <div class="quick-bid-row">
                        <button class="btn-quick" onclick="quickAdd('${item.id}', 100)">+100</button>
                        <button class="btn-quick" onclick="quickAdd('${item.id}', 500)">+500</button>
                        <button class="btn-quick" onclick="quickAdd('${item.id}', 1000)">+1000</button>
                    </div>

                    <button class="btn-bid" id="btn-${item.id}" onclick="processBid('${item.id}')" 
                        ${isLeading ? 'disabled' : ''}>
                        ${isLeading ? '您目前領先中' : '立即出價'}
                    </button>
                </div>

                <div id="ui-win-${item.id}" class="win-box">
                    <div style="color:var(--success); font-weight:bold;">此拍賣已結標</div>
                    <div style="font-size:0.9rem">得標：<b id="winner-${item.id}" style="color:#fff">${item.winner}</b></div>
                    <div style="font-size:0.8rem; color:var(--text-dim); margin-top:5px;">聯繫賣家：${item.contact}</div>
                </div>

                ${isAdmin ? `<button class="admin-del-btn" onclick="deleteItem('${item.id}')">刪除此項目</button>` : ''}
            `;
            container.appendChild(card);
        });
    }

    function formatHistory(history) {
        return (history || []).map(h => `<div class="hist-entry"><span>${h.user}</span><span style="color:var(--success)">$${h.amount.toLocaleString()}</span></div>`).reverse().slice(0, 3).join('');
    }

    function quickAdd(id, amount) {
        const input = document.getElementById(`val-${id}`);
        input.value = (parseInt(input.value) || 0) + amount;
    }

    function processBid(id) {
        const item = auctions.find(a => a.id === id);
        const nameInput = document.getElementById(`user-${id}`);
        const valInput = document.getElementById(`val-${id}`);
        const name = nameInput.value.trim();
        const amount = parseInt(valInput.value);

        if (!name || isNaN(amount)) return alert("請完整填寫資訊！");
        
        // 防呆：再次檢查是否領先（防止透過控制台操作）
        if (item.lastBidderId === myBidderId) return alert("您目前已經是最高出價者囉！");

        if (amount < (item.currentBid + item.minInc)) return alert(`出價金額太低，至少需 $${item.currentBid + item.minInc}`);

        // 更新資料
        item.currentBid = amount;
        item.winner = name;
        item.lastBidderId = myBidderId; // 記錄領先者的 ID
        item.history.push({ user: name, amount: amount });
        localStorage.setItem('buyer_name', name);

        if (amount >= item.buyNow) item.isOver = true;

        localStorage.setItem('mouse_v53', JSON.stringify(auctions));

        // 局部更新不閃爍，但因為按鈕狀態改變（要鎖定），這次我們需要小幅度刷新按鈕區
        render(); 
        alert("出價成功！目前由您領先。");
    }

    function tick() {
        const now = new Date().getTime();
        auctions.forEach((item) => {
            const t1 = new Date(item.startTime).getTime();
            const t2 = new Date(item.endTime).getTime();
            const badge = document.getElementById(`badge-${item.id}`);
            const timer = document.getElementById(`timer-${item.id}`);
            const btn = document.getElementById(`btn-${item.id}`);
            const uiBid = document.getElementById(`ui-bid-${item.id}`);
            const uiWin = document.getElementById(`ui-win-${item.id}`);

            if (!badge || !timer) return;

            if (item.isOver || now > t2) {
                badge.className = "status-badge st-ended"; badge.innerText = "已結束";
                timer.innerText = "拍賣完畢";
                if(uiBid) uiBid.style.display = "none";
                if(uiWin) uiWin.style.display = "block";
            } else if (now < t1) {
                badge.className = "status-badge st-upcoming"; badge.innerText = "尚未開始";
                timer.innerText = "開標倒數 " + formatTime(t1 - now);
                if(btn) btn.disabled = true;
            } else {
                badge.className = "status-badge st-active"; badge.innerText = "標售中";
                timer.innerText = "剩餘時間 " + formatTime(t2 - now);
                // 這裡不直接改 btn.disabled，因為 render() 已經處理了領先者鎖定
            }
        });
    }

    function formatTime(ms) {
        let h = Math.floor(ms/3600000).toString().padStart(2,'0');
        let m = Math.floor((ms%3600000)/60000).toString().padStart(2,'0');
        let s = Math.floor((ms%60000)/1000).toString().padStart(2,'0');
        return `${h}:${m}:${s}`;
    }

    document.getElementById('footer-btn').onclick = function() {
        if (!isAdmin) {
            if (prompt("ADMIN ACCESS") === "0857") {
                isAdmin = true;
                sessionStorage.setItem('isAdmin', 'true');
                render();
            }
        } else toggleModal(true);
    };

    function addItem() {
        const newItem = {
            id: 'id' + Date.now(),
            name: document.getElementById('m-name').value || "未知商品",
            currentBid: parseInt(document.getElementById('m-start-p').value) || 0,
            minInc: parseInt(document.getElementById('m-min').value) || 100,
            buyNow: parseInt(document.getElementById('m-buy').value) || 99999,
            startTime: document.getElementById('m-t1').value,
            endTime: document.getElementById('m-t2').value,
            contact: document.getElementById('m-contact').value || "暫無",
            history: [], winner: "無", lastBidderId: null, isOver: false
        };

        if(!newItem.startTime || !newItem.endTime) return alert("請完整填寫開始與結束時間！");
        
        auctions.push(newItem);
        localStorage.setItem('mouse_v53', JSON.stringify(auctions));
        render();
        toggleModal(false);
    }

    function deleteItem(id) {
        if(confirm("確定刪除？")) {
            auctions = auctions.filter(a => a.id !== id);
            localStorage.setItem('mouse_v53', JSON.stringify(auctions));
            render();
        }
    }

    function toggleModal(s) { document.getElementById('admin-modal').style.display = s ? 'block' : 'none'; }

    init();
</script>
</body>
</html>
